<VirtualHost *:80>
    ServerName www.onboardingBelen.local
    ServerAlias onboardingBelen.local
    DocumentRoot YOUR_PATH/onboardingBelen
    <Directory "YOUR_PATH/onboardingBelen">
        AllowOverride All
        Options -Indexes +FollowSymLinks
        FallbackResource /index.php

    </Directory>
    RewriteEngine On
    RewriteCond %{HTTP:X-Forwarded-Proto} =http
    RewriteRule .* https://%{HTTP:Host}%{REQUEST_URI} [L,R=permanent]
    
</VirtualHost>